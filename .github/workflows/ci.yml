# .github/workflows/ci.yml
# GitHub Actions CI/CD Pipeline
# This runs automatically every time we push code to GitHub

name: CI/CD Pipeline

# TRIGGER: 
on:
  push:
    branches: [ main ]       # On every push to main branch
  pull_request:
    branches: [ main ]       # On every pull request to main

jobs:

  # ─── JOB 1: Run Tests ──────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest   # Use a fresh Ubuntu virtual machine

    steps:
      # 1. Download your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install app dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: task-api

      # 4. Run pytest - if any test fails, the pipeline stops here
      - name: Run tests
        run: pytest test_app.py -v
        working-directory: task-api

  # ─── JOB 2: Build Docker Image ─────────────────────────────────────
  # This job only runs AFTER the test job passes
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # Depends on test job succeeding

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Docker image 
      - name: Build Docker image
        run: docker build -t task-api:latest .
        working-directory: task-api


